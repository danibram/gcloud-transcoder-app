name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v (example: 1.0.0)"
        required: true
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      draft: ${{ steps.release_meta.outputs.draft }}
      prerelease: ${{ steps.release_meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRAFT: ${{ inputs.draft }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const eventName = process.env.GITHUB_EVENT_NAME;
          const refName = process.env.GITHUB_REF_NAME || '';
          const requestedVersion = eventName === 'push'
            ? refName.replace(/^v/, '')
            : (process.env.INPUT_VERSION || '').trim();

          if (!requestedVersion) {
            throw new Error('A release version is required.');
          }

          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(requestedVersion)) {
            throw new Error(`Invalid semantic version: ${requestedVersion}`);
          }

          const expectedVersions = [
            ['Cargo.toml', /^version = "([^"]+)"$/m],
            ['src-tauri/Cargo.toml', /^version = "([^"]+)"$/m],
            ['src-tauri/tauri.conf.json', /"version": "([^"]+)"/m],
            ['ui/package.json', /"version": "([^"]+)"/m]
          ];

          const mismatches = [];
          for (const [file, pattern] of expectedVersions) {
            const content = fs.readFileSync(file, 'utf8');
            const match = content.match(pattern);
            const version = match && match[1];
            if (version !== requestedVersion) {
              mismatches.push(`${file}=${version ?? 'missing'}`);
            }
          }

          if (mismatches.length > 0) {
            throw new Error(
              `Release version ${requestedVersion} does not match project files: ${mismatches.join(', ')}`
            );
          }

          const isPush = eventName === 'push';
          const draft = isPush ? 'false' : String(process.env.INPUT_DRAFT === 'true');
          const prerelease = isPush ? 'false' : String(process.env.INPUT_PRERELEASE === 'true');
          const output = process.env.GITHUB_OUTPUT;

          fs.appendFileSync(output, `version=${requestedVersion}\n`);
          fs.appendFileSync(output, `tag=v${requestedVersion}\n`);
          fs.appendFileSync(output, `draft=${draft}\n`);
          fs.appendFileSync(output, `prerelease=${prerelease}\n`);
          EOF

  build-tauri:
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            file

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust toolchain
        if: ${{ matrix.rust_targets != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Rust toolchain
        if: ${{ matrix.rust_targets == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm --prefix ui ci

      - name: Generate updater config
        shell: bash
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if [ -z "${TAURI_UPDATER_PUBLIC_KEY}" ]; then
            echo "TAURI_UPDATER_PUBLIC_KEY repository variable is required for updater-enabled releases." >&2
            exit 1
          fi

          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const publicKey = (process.env.TAURI_UPDATER_PUBLIC_KEY || '').trim();
          const repository = process.env.GITHUB_REPOSITORY;

          if (!repository) {
            throw new Error('GITHUB_REPOSITORY is not set.');
          }

          const configPath = path.join(process.cwd(), 'src-tauri', 'tauri.release.conf.json');
          const config = {
            bundle: {
              createUpdaterArtifacts: true,
            },
            plugins: {
              updater: {
                pubkey: publicKey,
                endpoints: [
                  `https://github.com/${repository}/releases/latest/download/latest.json`,
                ],
                windows: {
                  installMode: 'passive',
                },
              },
            },
          };

          fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
          EOF

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          args: ${{ matrix.args }} --config tauri.release.conf.json

  prepare-release:
    needs:
      - resolve-release
      - build-tauri
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.ensure_release.outputs.release_id }}
    steps:
      - name: Ensure GitHub draft release exists
        id: ensure_release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          RELEASE_NAME: Transcoder App v${{ needs.resolve-release.outputs.version }}
          RELEASE_BODY: |
            Desktop builds for Transcoder App.

            Download the installer or bundle asset for your platform from this release.
          RELEASE_PRERELEASE: ${{ needs.resolve-release.outputs.prerelease }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;
            const name = process.env.RELEASE_NAME;
            const body = process.env.RELEASE_BODY;
            const prerelease = process.env.RELEASE_PRERELEASE === 'true';

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              if (!release.draft) {
                core.setFailed(`Release ${tag} already exists and is published. Delete it or use a new version.`);
                return;
              }
              core.setOutput('release_id', String(release.id));
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const { data: release } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name,
                body,
                draft: true,
                prerelease,
                target_commitish: context.sha,
                generate_release_notes: true,
              });
              core.setOutput('release_id', String(release.id));
            }

  publish-tauri:
    needs:
      - resolve-release
      - prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            file

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust toolchain
        if: ${{ matrix.rust_targets != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Rust toolchain
        if: ${{ matrix.rust_targets == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm --prefix ui ci

      - name: Generate updater config
        shell: bash
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if [ -z "${TAURI_UPDATER_PUBLIC_KEY}" ]; then
            echo "TAURI_UPDATER_PUBLIC_KEY repository variable is required for updater-enabled releases." >&2
            exit 1
          fi

          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const publicKey = (process.env.TAURI_UPDATER_PUBLIC_KEY || '').trim();
          const repository = process.env.GITHUB_REPOSITORY;

          if (!repository) {
            throw new Error('GITHUB_REPOSITORY is not set.');
          }

          const configPath = path.join(process.cwd(), 'src-tauri', 'tauri.release.conf.json');
          const config = {
            bundle: {
              createUpdaterArtifacts: true,
            },
            plugins: {
              updater: {
                pubkey: publicKey,
                endpoints: [
                  `https://github.com/${repository}/releases/latest/download/latest.json`,
                ],
                windows: {
                  installMode: 'passive',
                },
              },
            },
          };

          fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
          EOF

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tagName: ${{ needs.resolve-release.outputs.tag }}
          releaseName: Transcoder App v${{ needs.resolve-release.outputs.version }}
          releaseBody: |
            Desktop builds for Transcoder App.

            Download the installer or bundle asset for your platform from this release.
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          releaseCommitish: ${{ github.sha }}
          releaseDraft: true
          prerelease: ${{ needs.resolve-release.outputs.prerelease }}
          generateReleaseNotes: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }} --config tauri.release.conf.json

  cleanup-release:
    if: ${{ always() && needs.prepare-release.result == 'success' && needs.publish-tauri.result != 'success' }}
    needs:
      - resolve-release
      - prepare-release
      - publish-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Delete incomplete draft release and tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = Number('${{ needs.prepare-release.outputs.release_id }}');
            const tag = '${{ needs.resolve-release.outputs.tag }}';

            try {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) {
                throw error;
              }
            }

  finalize-release:
    if: ${{ needs.publish-tauri.result == 'success' }}
    needs:
      - resolve-release
      - prepare-release
      - publish-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number('${{ needs.prepare-release.outputs.release_id }}'),
              tag_name: '${{ needs.resolve-release.outputs.tag }}',
              name: 'Transcoder App v${{ needs.resolve-release.outputs.version }}',
              draft: ${{ needs.resolve-release.outputs.draft == 'true' }},
              prerelease: ${{ needs.resolve-release.outputs.prerelease == 'true' }},
            });
